<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RepoSage — Chat with any GitHub Repo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --text: #e6edf3; --muted: #7d8590;
    --accent: #58a6ff; --accent2: #3fb950; --danger: #f85149;
    --radius: 8px; --font: system-ui, -apple-system, sans-serif;
  }
  [data-theme="light"] {
    --bg: #ffffff; --bg2: #f6f8fa; --bg3: #eaeef2;
    --border: #d0d7de; --text: #1f2328; --muted: #636c76;
    --accent: #0969da; --accent2: #1a7f37; --danger: #cf222e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  a { color: var(--accent); }

  /* ── Header ── */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 13px; color: var(--muted); }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .icon-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 6px 10px; border-radius: var(--radius); cursor: pointer; font-size: 13px;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--text); }

  /* ── Index bar ── */
  #index-bar {
    display: flex; gap: 8px; align-items: center;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  #url-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: var(--radius);
    font-size: 14px; outline: none; font-family: monospace;
  }
  #url-input:focus { border-color: var(--accent); }
  #url-input::placeholder { color: var(--muted); }
  .btn {
    padding: 8px 16px; border-radius: var(--radius); border: none;
    cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--font);
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text); }
  #repo-badge {
    display: none; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--accent2); color: var(--accent2);
    padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
  }
  #repo-badge.visible { display: flex; }

  /* ── Main layout ── */
  main { display: flex; flex: 1; overflow: hidden; }

  /* ── Chat panel ── */
  #chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .message { display: flex; gap: 12px; max-width: 820px; }
  .message.user { flex-direction: row-reverse; margin-left: auto; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }
  .avatar.ai { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; }
  .avatar.user { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .bubble {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    font-size: 14px; line-height: 1.65; max-width: 680px;
  }
  .message.user .bubble { background: var(--accent); color: #fff; border-color: var(--accent); }
  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble pre { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0; }
  .bubble code { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12.5px; }
  .bubble p > code { background: var(--bg3); padding: 2px 5px; border-radius: 4px; }
  [data-theme="light"] .bubble pre { background: #f6f8fa; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 8px 0; }
  .typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ── Input area ── */
  #input-area {
    padding: 16px 20px; border-top: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  #input-row { display: flex; gap: 8px; align-items: flex-end; }
  #question {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: var(--radius);
    font-size: 14px; font-family: var(--font); outline: none; resize: none;
    min-height: 44px; max-height: 120px; line-height: 1.5;
  }
  #question:focus { border-color: var(--accent); }
  #question::placeholder { color: var(--muted); }
  #question:disabled { opacity: 0.5; cursor: not-allowed; }
  #send-btn { height: 44px; padding: 0 18px; flex-shrink: 0; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* ── Sources sidebar ── */
  #sources-panel {
    width: 260px; border-left: 1px solid var(--border);
    background: var(--bg2); display: flex; flex-direction: column;
    overflow: hidden; flex-shrink: 0;
  }
  .sources-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  #sources-list { overflow-y: auto; flex: 1; padding: 8px; }
  .source-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 6px; font-size: 12px;
    color: var(--muted); cursor: default; font-family: monospace;
    word-break: break-all;
  }
  .source-item:hover { background: var(--bg3); color: var(--text); }
  .source-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .empty-sources {
    padding: 24px 16px; text-align: center; color: var(--muted);
    font-size: 13px; line-height: 1.6;
  }

  /* ── Welcome screen ── */
  #welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; gap: 16px; padding: 40px;
    text-align: center; color: var(--muted);
  }
  .welcome-icon { font-size: 48px; }
  .welcome-title { font-size: 18px; font-weight: 600; color: var(--text); }
  .welcome-sub { font-size: 14px; line-height: 1.7; max-width: 400px; }
  .examples { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; width: 100%; max-width: 440px; }
  .example-btn {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: var(--radius);
    cursor: pointer; font-size: 13px; text-align: left;
    display: flex; align-items: center; gap: 8px;
  }
  .example-btn:hover { border-color: var(--accent); color: var(--accent); }
  .example-emoji { font-size: 16px; }

  /* ── Status bar ── */
  #status-bar {
    display: none; padding: 8px 20px; font-size: 12px;
    background: var(--bg3); border-bottom: 1px solid var(--border);
    color: var(--muted); flex-shrink: 0;
  }
  #status-bar.visible { display: block; }
  #status-bar.error { color: var(--danger); }
  #status-bar.success { color: var(--accent2); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 640px) {
    #sources-panel { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Repo<span>Sage</span></div>
  <div class="tagline">Chat with any public GitHub repository</div>
  <div class="header-actions">
    <div id="repo-badge" class="repo-badge">
      <span>●</span>
      <span id="repo-name"></span>
    </div>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">☀/🌙</button>
    <button class="icon-btn" onclick="clearChat()" title="New chat">New chat</button>
  </div>
</header>

<div id="status-bar"></div>

<div id="index-bar">
  <input
    id="url-input"
    type="text"
    placeholder="https://github.com/owner/repo"
    onkeydown="if(event.key==='Enter') indexRepo()"
  />
  <button class="btn btn-primary" id="index-btn" onclick="indexRepo()">Index Repo</button>
</div>

<main>
  <div id="chat-panel">
    <div id="messages">
      <div id="welcome">
        <div class="welcome-icon">🧠</div>
        <div class="welcome-title">Ask anything about a codebase</div>
        <div class="welcome-sub">
          Paste a public GitHub URL above, click <strong>Index Repo</strong>,
          then ask questions in plain English.
        </div>
        <div class="examples">
          <button class="example-btn" onclick="setExample('https://github.com/fastapi/fastapi', 'How does the dependency injection system work?')">
            <span class="example-emoji">⚡</span> FastAPI — How does dependency injection work?
          </button>
          <button class="example-btn" onclick="setExample('https://github.com/expressjs/express', 'How does the router handle middleware?')">
            <span class="example-emoji">🚀</span> Express — How does router middleware work?
          </button>
          <button class="example-btn" onclick="setExample('https://github.com/pallets/flask', 'How does the request context work?')">
            <span class="example-emoji">🌶️</span> Flask — How does the request context work?
          </button>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div id="input-row">
        <textarea
          id="question"
          placeholder="Index a repo first, then ask anything about its code…"
          rows="1"
          disabled
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="btn btn-primary" id="send-btn" onclick="sendMessage()" disabled>Send</button>
      </div>
      <div class="hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

  <div id="sources-panel">
    <div class="sources-header">Sources</div>
    <div id="sources-list">
      <div class="empty-sources">Sources from the retrieved chunks will appear here after each answer.</div>
    </div>
  </div>
</main>

<script>
const API = window.location.origin;
let currentRepo = null;
let history = [];
let isStreaming = false;

// ── Theme ────────────────────────────────────────────────────────────────────
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
}

// ── Status bar ───────────────────────────────────────────────────────────────
function setStatus(msg, type = '') {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.className = 'visible' + (type ? ' ' + type : '');
}
function clearStatus() {
  document.getElementById('status-bar').className = '';
}

// ── Index repository ─────────────────────────────────────────────────────────
async function indexRepo() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;

  const btn = document.getElementById('index-btn');
  btn.disabled = true;
  btn.textContent = 'Indexing…';
  setStatus('Fetching files from GitHub and building vector index…');

  try {
    const res = await fetch(`${API}/api/index`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ github_url: url }),
      signal: AbortSignal.timeout(120000),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Indexing failed');

    currentRepo = data.repo_id;
    history = [];

    document.getElementById('repo-name').textContent = data.repo_id;
    document.getElementById('repo-badge').classList.add('visible');

    document.getElementById('question').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('question').focus();

    setStatus(
      `✓ Indexed ${data.file_count} files → ${data.chunk_count} chunks. Ready to chat!`,
      'success'
    );

    // Clear welcome, add greeting
    hideWelcome();
    addMessage('ai', `**${data.repo_id}** is indexed (${data.file_count} files, ${data.chunk_count} chunks). Ask me anything about this codebase!`);

    setTimeout(clearStatus, 4000);
  } catch (err) {
    setStatus('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Index Repo';
  }
}

// ── Chat ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming || !currentRepo) return;

  const input = document.getElementById('question');
  const question = input.value.trim();
  if (!question) return;

  input.value = '';
  input.style.height = 'auto';

  hideWelcome();
  addMessage('user', question);

  const { el: aiEl, contentEl } = addMessage('ai', '');
  contentEl.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  isStreaming = true;
  document.getElementById('send-btn').disabled = true;
  input.disabled = true;

  let fullText = '';

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo_id: currentRepo, question, history }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Chat failed');
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;

        const chunk = JSON.parse(raw);

        if (chunk.type === 'text') {
          fullText += chunk.content;
          contentEl.innerHTML = marked.parse(fullText);
          contentEl.querySelectorAll('pre code').forEach(hljs.highlightElement);
          scrollBottom();
        } else if (chunk.type === 'sources') {
          updateSources(chunk.content);
        } else if (chunk.type === 'error') {
          contentEl.innerHTML = `<span style="color:var(--danger)">${chunk.content}</span>`;
        }
      }
    }

    // Push to conversation history
    history.push({ role: 'user', content: question });
    history.push({ role: 'assistant', content: fullText });

  } catch (err) {
    contentEl.innerHTML = `<span style="color:var(--danger)">Error: ${err.message}</span>`;
  } finally {
    isStreaming = false;
    input.disabled = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMessage(role, text) {
  const container = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '🧠' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (text) {
    bubble.innerHTML = marked.parse(text);
    bubble.querySelectorAll('pre code').forEach(hljs.highlightElement);
  }

  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  container.appendChild(wrapper);
  scrollBottom();

  return { el: wrapper, contentEl: bubble };
}

function updateSources(paths) {
  const list = document.getElementById('sources-list');
  list.innerHTML = '';
  if (!paths || paths.length === 0) {
    list.innerHTML = '<div class="empty-sources">No sources retrieved.</div>';
    return;
  }
  for (const path of paths) {
    const item = document.createElement('div');
    item.className = 'source-item';
    item.innerHTML = `<span class="source-dot"></span><span title="${path}">${path}</span>`;
    list.appendChild(item);
  }
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function clearChat() {
  history = [];
  currentRepo = null;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('sources-list').innerHTML =
    '<div class="empty-sources">Sources from the retrieved chunks will appear here after each answer.</div>';
  document.getElementById('repo-badge').classList.remove('visible');
  document.getElementById('question').disabled = true;
  document.getElementById('send-btn').disabled = true;
  clearStatus();

  // Re-add welcome
  const welcome = document.createElement('div');
  welcome.id = 'welcome';
  welcome.innerHTML = document.querySelector('#welcome') ? '' : `
    <div class="welcome-icon">🧠</div>
    <div class="welcome-title">Ask anything about a codebase</div>
    <div class="welcome-sub">Paste a public GitHub URL above, click <strong>Index Repo</strong>, then ask questions in plain English.</div>`;
  document.getElementById('messages').appendChild(welcome);
}

function setExample(url, question) {
  document.getElementById('url-input').value = url;
  document.getElementById('question').value = question;
}

// ── Input helpers ─────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Marked config ─────────────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });
</script>
</body>
</html>
